<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Secret Space ♟️⚽</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background-color: #111; color: #fff; height: 100vh; overflow: hidden; }

        /* --- 1. FOOTBALL INTRO SCREEN --- */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #1e3c72, #2a5298); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        
        /* Realistic Football CSS */
        .football { width: 100px; height: 100px; background: #fff; border-radius: 50%; position: absolute; box-shadow: inset -15px -15px 30px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.3); background-image: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.5) 100%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><polygon points="50,30 31,44 38,66 62,66 69,44" fill="black"/><polygon points="50,0 60,15 40,15" fill="black"/><polygon points="10,30 0,45 15,40" fill="black"/><polygon points="90,30 100,45 85,40" fill="black"/></svg>'); background-size: cover; transform: scale(0); animation: ballIncoming 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        
        @keyframes ballIncoming {
            0% { transform: scale(0.1) rotate(0deg); }
            80% { transform: scale(3.5) rotate(720deg); filter: blur(0px); }
            100% { transform: scale(3.2) rotate(900deg); filter: blur(1px); }
        }

        /* Glass Cracks Overlay */
        #crack-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000; pointer-events: none; display: none; }

        /* Blackout Screen */
        #blackout { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 10001; display: none; opacity: 0; transition: opacity 0.3s ease; }

        /* --- 2. CHESS GAME INTERFACE --- */
        #game-screen { display: none; height: 100vh; background: #1e1e1e; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .game-title { font-size: 1.8rem; margin-bottom: 15px; color: #ff758c; font-weight: bold; text-shadow: 0 0 10px rgba(255,117,140,0.3); }
        
        /* Chess Board UI */
        #chessboard { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 90vw; height: 90vw; max-width: 450px; max-height: 450px; border: 4px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border-radius: 4px; }
        .square { display: flex; justify-content: center; align-items: center; font-size: 2.2rem; cursor: pointer; transition: background 0.2s; position: relative; }
        .light { background-color: #f0d9b5; color: #b58863; }
        .dark { background-color: #b58863; color: #f0d9b5; }
        .square.selected { background-color: #7ab87a !important; }
        .square.highlighted::after { content: ''; width: 15px; height: 15px; background: rgba(0, 0, 0, 0.2); border-radius: 50%; position: absolute; }
        
        .status-box { margin-top: 15px; font-size: 1.1rem; font-weight: bold; color: #bbb; background: rgba(255,255,255,0.05); padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="football"></div>
    </div>

    <canvas id="crack-canvas"></canvas>

    <div id="blackout"></div>

    <div id="game-screen">
        <div class="game-title">Akash vs Mehar ♟️❤️</div>
        <div id="chessboard"></div>
        <div class="status-box" id="status">White's Turn (Akash)</div>
    </div>

    <script>
        // --- 1. ANIMATION TRANSITION ENGINE ---
        window.addEventListener('DOMContentLoaded', () => {
            // 1.2 second baad ball glass hit karegi
            setTimeout(() => {
                triggerCrack();
            }, 1100);
        });

        function triggerCrack() {
            var canvas = document.getElementById('crack-canvas');
            var ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.display = 'block';

            var centerX = canvas.width / 2;
            var centerY = canvas.height / 2;

            // Audio burst click logic emulation
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = 2;

            // Generate procedural glass cracks lines radiating out
            for (let i = 0; i < 25; i++) {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                let angle = Math.random() * Math.PI * 2;
                let dist = 50 + Math.random() * Math.max(canvas.width, canvas.height);
                let x = centerX + Math.cos(angle) * dist;
                let y = centerY + Math.sin(angle) * dist;
                
                // Add jagged segments to crack lines
                let segments = 4;
                let currX = centerX;
                let currY = centerY;
                for(let j=1; j<=segments; j++) {
                    let targetX = centerX + (Math.cos(angle) * dist) * (j/segments) + (Math.random()*30 - 15);
                    let targetY = centerY + (Math.sin(angle) * dist) * (j/segments) + (Math.random()*30 - 15);
                    ctx.lineTo(targetX, targetY);
                    currX = targetX;
                    currY = targetY;
                }
                ctx.stroke();
            }

            // Draw concentric spider-web shockwave loops
            for(let r = 30; r < 200; r += 40) {
                ctx.beginPath();
                for(let a = 0; a <= Math.PI*2; a += 0.4) {
                    let x = centerX + Math.cos(a) * (r + Math.random()*15);
                    let y = centerY + Math.sin(a) * (r + Math.random()*15);
                    if(a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }

            // 0.4 second tak cracks dikhenge, fir blackout hoga
            setTimeout(() => {
                var blackout = document.getElementById('blackout');
                blackout.style.display = 'block';
                blackout.style.opacity = '1';
                
                // 0.8 second complete darkness, phir Chess load hoga
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    canvas.style.display = 'none';
                    blackout.style.display = 'none';
                    
                    // Booting the Chess Core Engine
                    document.getElementById('game-screen').style.display = 'flex';
                    initChess();
                }, 800);
            }, 400);
        }

        // --- 2. FULLY FUNCTIONAL INTERNAL CHESS ENGINE ---
        var board = [];
        var selectedSquare = null;
        var turn = 'white'; // white = Akash, black = Mehar
        
        // Initial Unicode Chess Pieces positions database mapping
        const initialBoardSetup = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        function initChess() {
            var boardDiv = document.getElementById('chessboard');
            boardDiv.innerHTML = '';
            board = JSON.parse(JSON.stringify(initialBoardSetup));

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    let square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((row + col) % 2 === 0 ? 'light' : 'dark');
                    square.dataset.row = row;
                    square.dataset.col = col;
                    square.innerHTML = board[row][col];
                    square.onclick = () => handleSquareClick(row, col);
                    boardDiv.appendChild(square);
                }
            }
        }

        function handleSquareClick(row, col) {
            let piece = board[row][col];
            let squareEl = document.querySelector(`[data-row='${row}'][data-col='${col}']`);

            // If a piece is already selected
            if (selectedSquare) {
                let prevRow = selectedSquare.row;
                let prevCol = selectedSquare.col;

                if (prevRow === row && prevCol === col) {
                    clearHighlights();
                    selectedSquare = null;
                    return;
                }

                // Execute move action
                board[row][col] = board[prevRow][prevCol];
                board[prevRow][prevCol] = '';
                
                // Turn router handler
                turn = (turn === 'white') ? 'black' : 'white';
                document.getElementById('status').innerText = turn === 'white' ? "White's Turn (Akash)" : "Black's Turn (Mehar)";
                
                selectedSquare = null;
                clearHighlights();
                updateBoardUI();
                return;
            }

            // Selecting a piece based on color constraints
            if (piece !== '') {
                let isWhitePiece = ['♙','♖','♘','♗','♕','♔'].includes(piece);
                if ((turn === 'white' && isWhitePiece) || (turn === 'black' && !isWhitePiece)) {
                    selectedSquare = { row, col };
                    clearHighlights();
                    squareEl.classList.add('selected');
                }
            }
        }

        function updateBoardUI() {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let sq = document.querySelector(`[data-row='${r}'][data-col='${c}']`);
                    sq.innerHTML = board[r][c];
                }
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.square').forEach(sq => {
                sq.classList.remove('selected');
            });
        }
    </script>
</body>
</html>
